# HAPPY SAC — Configuración Supabase CLI
# Docs: https://supabase.com/docs/reference/cli/config

project_id = "trkokphwmkedhxwjriod"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3001/auth/callback",
  "http://localhost:3002/auth/callback",
  "https://disfraceshappys.com/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # producción: true cuando SMTP esté listo

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.disfraces-fotos]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/avif"]

[storage.buckets.fichas-tecnicas]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "application/pdf"]

[storage.buckets.comprobantes]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["application/pdf", "application/xml", "text/xml"]

[storage.buckets.evidencias-pago]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "application/pdf"]

[storage.buckets.banners-web]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/avif"]

[edge_runtime]
enabled = true
inspector_port = 8083
